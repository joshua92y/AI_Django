<!-- store/templates/store/product_add.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>상품 등록</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    function previewImage(event) {
      const input = event.target;
      const preview = document.getElementById('preview');
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => preview.src = e.target.result;
        reader.readAsDataURL(input.files[0]);
      }
    }
  </script>
  <!-- ✅ Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-8 col-sm-10">
        <div class="card shadow-sm">
          <div class="card-header bg-primary text-white">
            <h4 class="mb-0">📦 상품 등록</h4>
          </div>
          <div class="card-body">
            <form method="post" enctype="multipart/form-data" novalidate>
              {% csrf_token %}
                <!-- 미리보기 -->
              <div class="text-center mb-4">
                <img id="preview" src="https://via.placeholder.com/300x200?text=이미지+미리보기" class="img-fluid rounded" style="max-height: 200px;">
              </div>
              <div class="mb-3">
                <label for="image" class="form-label">상품 이미지</label>
                <input class="form-control" type="file" id="image" name="image" accept="image/*" onchange="previewImage(event)">
              </div>
              <div class="mb-3">
                <label for="number" class="form-label">상품번호</label>
                <input type="number" class="form-control" id="number" name="number" required>
              </div>

              <div class="mb-3">
                <label for="name" class="form-label">상품명</label>
                <input type="text" class="form-control" id="name" name="name" required>
              </div>

              <div class="mb-3">
                <label for="price" class="form-label">가격</label>
                <input type="number" class="form-control" id="price" name="price" required>
              </div>

              <div class="mb-3">
                <label for="manufacturer" class="form-label">제조사</label>
                <input type="text" class="form-control" id="manufacturer" name="manufacturer" required>
              </div>

              <div class="mb-3">
                <label for="made_date" class="form-label">제조일자</label>
                <input type="date" class="form-control" id="made_date" name="made_date" required>
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-success">상품 등록</button>
              </div>
            </form>
          </div>
          <div class="card-footer text-end">
            <a href="{% url 'product_list' %}" class="btn btn-outline-primary btn-sm">상품 목록 보기</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ✅ Bootstrap JS (optional) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
